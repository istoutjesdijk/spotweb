# Standalone Spotweb deployment (Synology NAS, plain Docker host, etc.).
# Includes a bundled MariaDB. Copy ../../.env.example to .env and adjust before
# starting. Image updates are pulled manually here; use
# docker-compose.watchtower.yml for automatic updates.
#
#   docker compose up -d
#
services:
  spotweb:
    image: ${SPOTWEB_IMAGE:-ghcr.io/istoutjesdijk/spotweb:latest}
    container_name: spotweb
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TZ=${TZ:-Europe/Amsterdam}
      - SPOTWEB_DB_TYPE=pdo_mysql
      - SPOTWEB_DB_HOST=db
      - SPOTWEB_DB_PORT=3306
      - SPOTWEB_DB_NAME=${MYSQL_DATABASE:-spotweb}
      - SPOTWEB_DB_USER=${MYSQL_USER:-spotweb}
      - SPOTWEB_DB_PASS=${MYSQL_PASSWORD:-spotweb}
      - SPOTWEB_CRON_RETRIEVE=${SPOTWEB_CRON_RETRIEVE:-*/15 * * * *}
    ports:
      - "${SPOTWEB_PORT:-8081}:8080"
    volumes:
      - spotweb-config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  db:
    image: mariadb:11
    container_name: spotweb-db
    restart: unless-stopped
    environment:
      - MARIADB_DATABASE=${MYSQL_DATABASE:-spotweb}
      - MARIADB_USER=${MYSQL_USER:-spotweb}
      - MARIADB_PASSWORD=${MYSQL_PASSWORD:-spotweb}
      - MARIADB_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - spotweb-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  spotweb-config:
  spotweb-db:
