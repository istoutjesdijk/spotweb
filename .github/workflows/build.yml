name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned upstream ref
        id: ref
        run: |
          full="$(cat .upstream-ref)"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "short=$(printf '%s' "$full" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: spotweb:test
          build-args: |
            SPOTWEB_REF=${{ steps.ref.outputs.full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        env:
          SPOTWEB_IMAGE: spotweb:test
        run: ./test/smoke.sh

  publish:
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned upstream ref
        id: ref
        run: |
          full="$(cat .upstream-ref)"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "short=$(printf '%s' "$full" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      # Always publish to GHCR. Add Docker Hub only when both the DOCKERHUB_USERNAME
      # variable and the DOCKERHUB_TOKEN secret are set, so a missing or half-finished
      # Docker Hub setup never fails the build; it just publishes to GHCR.
      - name: Assemble image list
        id: images
        run: |
          {
            echo "list<<EOF"
            echo "ghcr.io/${{ github.repository_owner }}/spotweb"
            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/spotweb"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.ref.outputs.short }}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64, arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # Publish a plain multi-arch index (amd64 + arm64) with no build
          # attestations. Buildx adds provenance/SBOM manifests as extra
          # "unknown/unknown" entries in the image index by default, and
          # "docker compose pull" (as used by Coolify) chokes on them with
          # "content digest ... not found". Disabling them keeps the image
          # pullable everywhere.
          provenance: false
          sbom: false
          build-args: |
            SPOTWEB_REF=${{ steps.ref.outputs.full }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-failure:
    needs: [build-test, publish]
    if: failure() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `The build workflow failed for commit ${context.sha}.\n\nRun: ${runUrl}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ci-failure",
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "CI build failed",
                body,
                labels: ["ci-failure"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            }
