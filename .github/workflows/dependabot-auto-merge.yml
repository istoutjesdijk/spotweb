name: dependabot-auto-merge

# Runs after the build workflow (build + smoke test) finishes for a Dependabot
# PR, so a green build is the gate.
#
# Base-image updates (dependabot/docker/*) are merged automatically: they do not
# touch workflow files, and a broken base image fails the smoke test and stays
# open. Action-version bumps change files under .github/workflows/, which the
# GITHUB_TOKEN is not allowed to merge (there is no grantable "workflows"
# permission), so those are left for a one-click manual merge; the workflow just
# flags them once instead of failing on a merge it cannot perform.

on:
  workflow_run:
    workflows: ["build"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Merge base-image updates, flag action bumps for manual merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.workflow_run.pull_requests[0].number }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PR" ]; then
            echo "No pull request linked to this run; nothing to do."
            exit 0
          fi

          case "$BRANCH" in
            dependabot/docker/*)
              echo "Base image change on PR #$PR; build is green, merging."
              gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
              # A merge pushed with GITHUB_TOKEN does not trigger build.yml, so
              # dispatch a publish explicitly (the trick upstream-update.yml uses)
              # to build and push a fresh image on the new base.
              echo "Dispatching build to republish the image."
              gh workflow run build.yml --ref main
              ;;
            *)
              # Workflow-file changes (action bumps) cannot be merged by the
              # GITHUB_TOKEN, so leave a single note that the PR is ready.
              marker="<!-- automerge-manual-note -->"
              if gh pr view "$PR" --repo "$REPO" --json comments \
                   --jq '.comments[].body' | grep -qF "$marker"; then
                echo "PR #$PR already flagged for manual merge; nothing to do."
              else
                echo "Flagging PR #$PR for manual merge."
                gh pr comment "$PR" --repo "$REPO" --body "$marker
Build passed. This PR changes workflow files, which the \`GITHUB_TOKEN\` is not allowed to merge, so it needs a manual merge: press Merge, or run \`gh pr merge $PR --squash --delete-branch\`."
              fi
              ;;
          esac
