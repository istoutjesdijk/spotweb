name: dependabot-auto-merge

# Auto-merges Dependabot PRs, but only after the build workflow (build + smoke
# test) has gone green for that PR. Gating on workflow_run means the functional
# smoke test in build.yml is the merge condition: a base-image bump that breaks
# Spotweb fails the smoke test and stays open for manual attention.
#
# This deliberately avoids GitHub's native "auto-merge" (gh pr merge --auto),
# which needs branch protection with required checks. Such a rule would also
# block the direct push that upstream-update.yml makes to main, so we merge
# from the workflow_run context instead, which runs with a full repo token.

on:
  workflow_run:
    workflows: ["build"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Merge the PR, and republish when the image changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.workflow_run.pull_requests[0].number }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PR" ]; then
            echo "No pull request linked to this run; nothing to merge."
            exit 0
          fi
          echo "Build passed for PR #$PR ($BRANCH); merging."
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch

          # A merge pushed with GITHUB_TOKEN does not trigger build.yml, so when
          # the base image changed, dispatch a publish explicitly (the same trick
          # upstream-update.yml uses). Action-version bumps do not change the
          # image, so they need no rebuild.
          case "$BRANCH" in
            dependabot/docker/*)
              echo "Base image changed; dispatching build to republish the image."
              gh workflow run build.yml --ref main ;;
            *)
              echo "No image change; skipping republish." ;;
          esac
