user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 32m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root /var/www/spotweb;
        index index.php;

        # Health endpoint served by nginx directly. It does not touch PHP or the
        # database, so it stays green during brief database hiccups and gives
        # Coolify / Docker a fast, reliable liveness signal.
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_read_timeout 300;
        }

        location ~* \.(?:css|js|jpe?g|gif|png|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public";
            try_files $uri /index.php$is_args$args;
        }

        # Never serve configuration or hidden files.
        location ~* /(dbsettings\.inc\.php|ownsettings\.php)$ { deny all; }
        location ~ /\.(?!well-known) { deny all; }
    }
}
